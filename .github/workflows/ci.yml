name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for broken links in README
        run: |
          if [ -f README.md ]; then
            grep -n "http" README.md | grep -v "https://github.com" | head -20 || true
          fi
      - name: Verify repo has description-worthy README
        run: |
          if [ ! -f README.md ]; then
            echo "::warning::No README.md found"
          fi
          if [ "$(wc -l < README.md 2>/dev/null || echo 0)" -lt 5 ]; then
            echo "::warning::README.md is very short"
          fi
